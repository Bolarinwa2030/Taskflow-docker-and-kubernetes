<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0f12;
      --surface: #151820;
      --border:  #252830;
      --text:    #e2e4e8;
      --muted:   #666b78;
      --accent:  #5af78e;
      --warn:    #f7d05a;
      --danger:  #f75a5a;
      --info:    #5ab4f7;
      --mono:    'IBM Plex Mono', monospace;
      --sans:    'IBM Plex Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      padding: 2rem;
    }

    header {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      margin-bottom: 2.5rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1rem;
    }

    .logo {
      font-size: 1.25rem;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: -0.02em;
    }

    .logo::before { content: '$ '; color: var(--muted); }

    .tagline {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .stats-bar {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stat-label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
    .stat-value { font-size: 1.5rem; font-weight: 500; color: var(--text); }
    .stat-value.accent { color: var(--accent); }
    .stat-value.warn   { color: var(--warn); }
    .stat-value.info   { color: var(--info); }

    .main-grid {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 1.5rem;
      align-items: start;
    }

    @media (max-width: 720px) {
      .main-grid { grid-template-columns: 1fr; }
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1.25rem;
    }

    .panel-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .form-group { margin-bottom: 0.9rem; }
    .form-group label { display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 4px; }

    input[type="text"], textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.85rem;
      padding: 0.5rem 0.75rem;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus, textarea:focus {
      border-color: var(--accent);
    }

    textarea { resize: vertical; min-height: 80px; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--accent);
      color: #0d0f12;
      border: none;
      border-radius: 4px;
      padding: 0.55rem 1.2rem;
      font-family: var(--mono);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      width: 100%;
      justify-content: center;
    }

    .btn:hover   { opacity: 0.85; }
    .btn:active  { transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .task-list { display: flex; flex-direction: column; gap: 8px; }

    .task-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.75rem 1rem;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 4px 12px;
      align-items: start;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }

    .task-title { font-size: 0.85rem; font-weight: 500; color: var(--text); }
    .task-meta  { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }
    .task-result { font-size: 0.72rem; color: var(--muted); margin-top: 4px; font-style: italic; grid-column: 1 / -1; }

    .badge {
      font-size: 0.65rem;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    .badge-queued     { background: #252830; color: var(--muted); }
    .badge-processing { background: #1e2a1a; color: var(--accent); border: 1px solid #2e4a2a; }
    .badge-done       { background: #162a1e; color: var(--accent); }
    .badge-failed     { background: #2a1616; color: var(--danger); }

    .empty-state {
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
      padding: 2rem 0;
    }

    .empty-state::before { content: '// '; }

    .refresh-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }

    .refresh-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.7rem;
      padding: 3px 10px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .refresh-btn:hover { color: var(--text); border-color: var(--muted); }

    .spinner {
      display: inline-block;
      width: 10px; height: 10px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg { font-size: 0.75rem; color: var(--danger); margin-top: 6px; }

    .cursor-blink {
      display: inline-block;
      width: 8px; height: 14px;
      background: var(--accent);
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body>
  <header>
    <div class="logo">taskflow<span class="cursor-blink"></span></div>
    <div class="tagline">distributed task queue — devops portfolio project</div>
  </header>

  <div class="stats-bar" id="stats-bar">
    <div class="stat"><span class="stat-label">queued</span><span class="stat-value info" id="s-queued">—</span></div>
    <div class="stat"><span class="stat-label">processing</span><span class="stat-value warn" id="s-processing">—</span></div>
    <div class="stat"><span class="stat-label">done</span><span class="stat-value accent" id="s-done">—</span></div>
    <div class="stat"><span class="stat-label">failed</span><span class="stat-value" style="color:var(--danger)" id="s-failed">—</span></div>
    <div class="stat"><span class="stat-label">redis queue</span><span class="stat-value" id="s-queue">—</span></div>
  </div>

  <div class="main-grid">
    <!-- Submit form -->
    <div class="panel">
      <div class="panel-title">// new task</div>
      <div class="form-group">
        <label>title</label>
        <input type="text" id="task-title" placeholder="e.g. send weekly report" />
      </div>
      <div class="form-group">
        <label>payload (optional)</label>
        <textarea id="task-payload" placeholder='{"key": "value"}'></textarea>
      </div>
      <button class="btn" id="submit-btn" onclick="submitTask()">
        → enqueue task
      </button>
      <div class="error-msg" id="form-error"></div>
    </div>

    <!-- Task list -->
    <div class="panel">
      <div class="refresh-row">
        <div class="panel-title" style="margin-bottom:0">// tasks</div>
        <button class="refresh-btn" onclick="loadTasks()">↻ refresh</button>
      </div>
      <div class="task-list" id="task-list">
        <div class="empty-state">no tasks yet</div>
      </div>
    </div>
  </div>

  <script>
    const API = window.API_URL || 'http://localhost:3000';

    async function loadStats() {
      try {
        const r = await fetch(`${API}/stats`);
        const data = await r.json();
        const map = {};
        (data.byStatus || []).forEach(row => { map[row.status] = parseInt(row.count); });
        document.getElementById('s-queued').textContent     = map.queued     || 0;
        document.getElementById('s-processing').textContent = map.processing || 0;
        document.getElementById('s-done').textContent       = map.done       || 0;
        document.getElementById('s-failed').textContent     = map.failed     || 0;
        document.getElementById('s-queue').textContent      = data.queueLength ?? '—';
      } catch {}
    }

    async function loadTasks() {
      try {
        const r = await fetch(`${API}/tasks`);
        const tasks = await r.json();
        const list = document.getElementById('task-list');
        if (!tasks.length) {
          list.innerHTML = '<div class="empty-state">no tasks yet</div>';
          return;
        }
        list.innerHTML = tasks.map(t => `
          <div class="task-item">
            <div>
              <div class="task-title">${esc(t.title)}</div>
              <div class="task-meta">${t.id.slice(0,8)}… · ${new Date(t.created_at).toLocaleTimeString()}</div>
              ${t.result ? `<div class="task-result">${esc(t.result)}</div>` : ''}
            </div>
            <span class="badge badge-${t.status}">${t.status}</span>
          </div>
        `).join('');
      } catch (err) {
        document.getElementById('task-list').innerHTML =
          '<div class="empty-state" style="color:var(--danger)">could not reach API</div>';
      }
    }

    async function submitTask() {
      const title   = document.getElementById('task-title').value.trim();
      const payload = document.getElementById('task-payload').value.trim();
      const errEl   = document.getElementById('form-error');
      const btn     = document.getElementById('submit-btn');
      errEl.textContent = '';

      if (!title) { errEl.textContent = 'title is required'; return; }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> sending…';

      try {
        const r = await fetch(`${API}/tasks`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, payload }),
        });
        if (!r.ok) throw new Error((await r.json()).error);
        document.getElementById('task-title').value   = '';
        document.getElementById('task-payload').value = '';
        await Promise.all([loadTasks(), loadStats()]);
      } catch (err) {
        errEl.textContent = err.message || 'failed to submit task';
      } finally {
        btn.disabled = false;
        btn.innerHTML = '→ enqueue task';
      }
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // Auto-refresh every 3 seconds
    async function refresh() { await Promise.all([loadTasks(), loadStats()]); }
    refresh();
    setInterval(refresh, 3000);
  </script>
</body>
</html>

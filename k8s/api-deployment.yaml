apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: taskflow

spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api

    spec:
      containers:
        - name: api
          image: taskflow-api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

apiVersion: v1
kind: Service
metadata:
  name: api             # DNS name inside the cluster: "api"
  namespace: taskflow
spec:
  selector:
    app: api           # matches pods with label app=api
  ports:
    - port: 3000         # port other services use to reach this
      targetPort: 3000  # port the container actually listens on
  type: ClusterIP       # internal only

---
# frontend-service.yaml (NodePort so we can open it in browser)
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: taskflow
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080    # fixed external port on the node
  type: NodePort
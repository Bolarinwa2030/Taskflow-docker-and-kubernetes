apiVersion: v1
kind: ConfigMap
metadata:
  name: taskflow-config
  namespace: taskflow

data:
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  POSTGRES_DB: taskflow

---
# secret.yaml  (values must be base64 encoded)
apiVersion: v1
kind: Secret
metadata:
  name: taskflow-secret
  namespace: taskflow
type: Opaque
data:
  # echo -n "taskflow" | base64  →  dGFza2Zsb3c=
  POSTGRES_USER: dGFza2Zsb3c=
  POSTGRES_PASSWORD: Y2hhbmdlbWU=
